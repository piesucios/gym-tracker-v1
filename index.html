<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const initialData = {
  lunes: {
    label: "💪 LUNES — Cuádriceps & Glúteos", color: "blue",
    sections: [
      { name: "🔥 Activación previa", exercises: [
        { name: "Plancha", ref: "2x1min" },
        { name: "Rotación cadera", ref: "2x10" },
        { name: "Sentadillas peso corporal", ref: "2x15" },
        { name: "Patada glúteo banda", ref: "2x15" },
      ]},
      { name: "Ejercicios principales", exercises: [
        { name: "Sentadilla libre profunda", ref: "3x10-8-8" },
        { name: "Búlgaras en multipower", ref: "3x10" },
        { name: "Hip Thrust libre", ref: "3x10-8-8" },
        { name: "Extensión cuádriceps", ref: "3x10-12" },
        { name: "Patada glúteo en polea", ref: "3x12" },
      ]}
    ]
  },
  martes: {
    label: "💪 MARTES — Espalda & Bíceps", color: "purple",
    sections: [
      { name: "Espalda", exercises: [
        { name: "Remo con barra", ref: "3x10" },
        { name: "Jalón al pecho agarre amplio", ref: "4x10" },
        { name: "Remo con mancuerna unilateral", ref: "3x10" },
        { name: "Pull Over en polea alta", ref: "4x10" },
      ]},
      { name: "Bíceps", exercises: [
        { name: "Curl con barra", ref: "3x10" },
        { name: "Curl unilateral en banco inclinado", ref: "3x10" },
      ]}
    ]
  },
  jueves: {
    label: "💪 JUEVES — Pectoral, Hombro & Tríceps", color: "rose",
    sections: [
      { name: "Pectoral", exercises: [
        { name: "Press de Banca", ref: "4x10" },
        { name: "Aperturas con mancuerna en suelo", ref: "4x10" },
      ]},
      { name: "Hombro", exercises: [
        { name: "Press de hombro con barra", ref: "3x10" },
        { name: "Elevación frontal hombro con barra", ref: "3x10" },
        { name: "Elevación lateral unilateral en polea", ref: "3x10" },
      ]},
      { name: "Tríceps", exercises: [
        { name: "Extensión tríceps cuerda en polea", ref: "4x12" },
        { name: "Press francés tumbada con barra", ref: "3x10" },
      ]}
    ]
  },
  viernes: {
    label: "💪 VIERNES — Abdomen & Glúteo", color: "green",
    sections: [
      { name: "Abs", exercises: [
        { name: "Crunch en polea sentada en banco", ref: "3x15" },
        { name: "Crunch lateral en polea de pie", ref: "3x15" },
        { name: "Elevación de pierna con agarre atrás", ref: "3x15" },
        { name: "Plancha", ref: "3x1min" },
      ]},
      { name: "Glúteo", exercises: [
        { name: "Patada glúteo en cuadrupedia (smith)", ref: "3x12" },
        { name: "Abductor máquina", ref: "4x15" },
        { name: "Clamshell con disco o mancuerna", ref: "3x15" },
      ]}
    ]
  }
};

const WEEKS = ["S1","S2","S3","S4"];
const STORAGE_KEY = "gymtracker_cells_v1";

const colorMap = {
  blue:   { header:"bg-blue-600 text-white", section:"bg-blue-50 text-blue-700", row:"hover:bg-blue-50", badge:"bg-blue-100 text-blue-700", border:"border-blue-200", tab:"bg-blue-600 text-white", tabI:"bg-blue-100 text-blue-700 hover:bg-blue-200", chart:"#3b82f6" },
  purple: { header:"bg-purple-600 text-white", section:"bg-purple-50 text-purple-700", row:"hover:bg-purple-50", badge:"bg-purple-100 text-purple-700", border:"border-purple-200", tab:"bg-purple-600 text-white", tabI:"bg-purple-100 text-purple-700 hover:bg-purple-200", chart:"#9333ea" },
  rose:   { header:"bg-rose-500 text-white", section:"bg-rose-50 text-rose-700", row:"hover:bg-rose-50", badge:"bg-rose-100 text-rose-700", border:"border-rose-200", tab:"bg-rose-500 text-white", tabI:"bg-rose-100 text-rose-700 hover:bg-rose-200", chart:"#f43f5e" },
  green:  { header:"bg-emerald-600 text-white", section:"bg-emerald-50 text-emerald-700", row:"hover:bg-emerald-50", badge:"bg-emerald-100 text-emerald-700", border:"border-emerald-200", tab:"bg-emerald-600 text-white", tabI:"bg-emerald-100 text-emerald-700 hover:bg-emerald-200", chart:"#10b981" },
};

function makeKey(day,sec,ex,week){ return `${day}__${sec}__${ex}__${week}`; }

function extractKg(val){
  if(!val) return null;
  const m = val.match(/(\d+(?:[.,]\d+)?)\s*kg/i);
  return m ? parseFloat(m[1].replace(",",".")) : null;
}

function buildCSV(cells){
  const rows=[["Día","Sección","Ejercicio","Ref. Series","S1","S2","S3","S4"]];
  Object.entries(initialData).forEach(([dk,day])=>{
    day.sections.forEach(sec=>{
      sec.exercises.forEach(ex=>{
        const r=[day.label.replace(/💪\s*/,""),sec.name,ex.name,ex.ref];
        WEEKS.forEach(w=>r.push(cells[makeKey(dk,sec.name,ex.name,w)]||""));
        rows.push(r);
      });
    });
  });
  return rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
}

function Sparkline({points,color}){
  if(!points||points.length<2) return null;
  const w=120,h=40,pad=6;
  const xs=points.map((_,i)=>pad+(i/(points.length-1))*(w-pad*2));
  const mn=Math.min(...points),mx=Math.max(...points),rng=mx-mn||1;
  const ys=points.map(v=>h-pad-((v-mn)/rng)*(h-pad*2));
  return(
    <svg width={w} height={h} className="inline-block">
      <polyline points={xs.map((x,i)=>`${x},${ys[i]}`).join(" ")} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {xs.map((x,i)=><circle key={i} cx={x} cy={ys[i]} r="3" fill={color}/>)}
    </svg>
  );
}

function EvolutionTab({cells}){
  const rows=[];
  Object.entries(initialData).forEach(([dk,day])=>{
    const c=colorMap[day.color];
    day.sections.forEach(sec=>{
      sec.exercises.forEach(ex=>{
        const pts=WEEKS.map(w=>extractKg(cells[makeKey(dk,sec.name,ex.name,w)]));
        const valid=pts.filter(v=>v!==null);
        if(!valid.length) return;
        const trend=valid.length>1?valid[valid.length-1]-valid[0]:0;
        rows.push({dayLabel:day.label,ex,pts,valid,trend,c});
      });
    });
  });
  if(!rows.length) return(
    <div className="flex flex-col items-center justify-center py-20 text-gray-400">
      <div className="text-5xl mb-4">📊</div>
      <p className="text-lg font-semibold">Aún no hay datos de peso</p>
      <p className="text-sm mt-1">Usa el formato <span className="font-mono bg-gray-100 px-1 rounded">3x10 / 15kg</span></p>
    </div>
  );
  return(
    <div className="p-4 space-y-3">
      {rows.map((r,i)=>(
        <div key={i} className={`bg-white rounded-xl border ${r.c.border} p-4 flex items-center gap-4`}>
          <div className="flex-1 min-w-0">
            <div className={`text-xs font-semibold mb-0.5 ${r.c.badge.split(" ")[1]}`}>{r.dayLabel.replace(/💪\s*/,"")}</div>
            <div className="font-semibold text-gray-800 text-sm truncate">{r.ex.name}</div>
            <div className="flex gap-3 mt-1">
              {WEEKS.map((w,wi)=>(
                <div key={w} className="text-center">
                  <div className="text-xs text-gray-400">{w}</div>
                  <div className={`text-xs font-bold ${r.pts[wi]!==null?r.c.badge.split(" ")[1]:"text-gray-300"}`}>
                    {r.pts[wi]!==null?`${r.pts[wi]}kg`:"—"}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="flex flex-col items-center gap-1">
            <Sparkline points={r.valid} color={r.c.chart}/>
            <span className={`text-xs font-bold ${r.trend>0?"text-emerald-600":r.trend<0?"text-rose-500":"text-gray-400"}`}>
              {r.trend>0?`▲ +${r.trend}kg`:r.trend<0?`▼ ${r.trend}kg`:"= Sin cambio"}
            </span>
          </div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("lunes");
  const [cells,setCells]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }catch{ return {}; }
  });
  const [editing,setEditing]=useState(null);
  const [exported,setExported]=useState(false);

  useEffect(()=>{
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(cells)); }catch{}
  },[cells]);

  const updCell=(day,sec,ex,week,val)=>{
    setCells(p=>({...p,[makeKey(day,sec,ex,week)]:val}));
  };

  const handleExport=()=>{
    const csv=buildCSV(cells);
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="gym_seguimiento.csv";
    a.click(); URL.revokeObjectURL(url);
    setExported(true); setTimeout(()=>setExported(false),2000);
  };

  const isEvo=tab==="evolucion";
  const day=!isEvo?initialData[tab]:null;
  const c=day?colorMap[day.color]:null;

  return(
    <div className="min-h-screen bg-gray-50 p-3">
      <div className="max-w-5xl mx-auto">
        <div className="flex items-center justify-between mb-5">
          <div>
            <h1 className="text-xl font-bold text-gray-800">🏋️ Mi Gym Tracker</h1>
            <p className="text-gray-400 text-xs">Datos guardados en este dispositivo</p>
          </div>
          <button onClick={handleExport}
            className="flex items-center gap-2 bg-white border border-gray-200 hover:border-gray-300 text-gray-700 text-xs font-semibold px-3 py-2 rounded-lg shadow-sm transition-all">
            {exported?"✅ Descargado":"📥 Exportar CSV"}
          </button>
        </div>

        <div className="flex gap-2 mb-4 flex-wrap">
          {Object.entries(initialData).map(([k,v])=>{
            const tc=colorMap[v.color]; const active=tab===k;
            return <button key={k} onClick={()=>setTab(k)}
              className={`px-4 py-2 rounded-lg font-semibold text-sm transition-all ${active?tc.tab:tc.tabI}`}>
              {k.charAt(0).toUpperCase()+k.slice(1)}
            </button>;
          })}
          <button onClick={()=>setTab("evolucion")}
            className={`px-4 py-2 rounded-lg font-semibold text-sm transition-all ${tab==="evolucion"?"bg-gray-700 text-white":"bg-gray-200 text-gray-700 hover:bg-gray-300"}`}>
            📈 Evolución
          </button>
        </div>

        {isEvo&&(
          <div className="bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden">
            <div className="bg-gray-700 text-white px-6 py-4">
              <h2 className="text-lg font-bold">📈 Evolución del peso por ejercicio</h2>
            </div>
            <EvolutionTab cells={cells}/>
          </div>
        )}

        {!isEvo&&day&&(
          <div className={`bg-white rounded-2xl shadow-md border ${c.border} overflow-hidden`}>
            <div className={`${c.header} px-6 py-4`}>
              <h2 className="text-lg font-bold">{day.label}</h2>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-gray-100 text-gray-500 uppercase text-xs">
                    <th className="text-left px-4 py-3 w-8">#</th>
                    <th className="text-left px-4 py-3">Ejercicio</th>
                    <th className="text-center px-2 py-3 w-20">Ref.</th>
                    {WEEKS.map(w=><th key={w} className="text-center px-3 py-3 w-32">
                      <span className={`px-2 py-1 rounded-md font-bold ${c.badge}`}>{w}</span>
                    </th>)}
                  </tr>
                </thead>
                <tbody>
                  {day.sections.map(sec=>(
                    <React.Fragment key={sec.name}>
                      <tr>
                        <td colSpan={3+WEEKS.length} className={`${c.section} px-4 py-2 font-semibold text-xs uppercase tracking-wide`}>
                          {sec.name}
                        </td>
                      </tr>
                      {sec.exercises.map((ex,ei)=>(
                        <tr key={ex.name} className={`border-t border-gray-100 ${c.row} transition-colors`}>
                          <td className="px-4 py-3 text-gray-400">{ei+1}</td>
                          <td className="px-4 py-3 text-gray-800 font-medium">{ex.name}</td>
                          <td className="px-2 py-3 text-center text-gray-400 text-xs">{ex.ref}</td>
                          {WEEKS.map(w=>{
                            const ck=makeKey(tab,sec.name,ex.name,w);
                            const isEd=editing===ck;
                            const val=cells[ck]||"";
                            return(
                              <td key={w} className="px-2 py-2 text-center">
                                {isEd?(
                                  <input autoFocus
                                    className={`w-full text-center border-2 ${c.border} rounded-lg px-2 py-1.5 text-xs focus:outline-none bg-white`}
                                    value={val} placeholder="ej: 3x10 / 15kg"
                                    onChange={e=>updCell(tab,sec.name,ex.name,w,e.target.value)}
                                    onBlur={()=>setEditing(null)}
                                    onKeyDown={e=>e.key==="Enter"&&setEditing(null)}
                                  />
                                ):(
                                  <button onClick={()=>setEditing(ck)}
                                    className={`w-full min-h-[36px] rounded-lg border-2 border-dashed border-gray-200 px-2 py-1.5 text-xs transition-all hover:border-gray-400 ${val?`${c.badge} border-solid font-semibold`:"text-gray-300"}`}>
                                    {val||"＋"}
                                  </button>
                                )}
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="px-6 py-3 bg-gray-50 border-t border-gray-100 text-xs text-gray-400">
              💡 Haz clic en cualquier celda · Formato: <span className="font-mono">3x10 / 15kg</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
  </body>
</html>
